services:
  discord-bot:
    image: moderation-scanner:latest
    build:
      context: .
    init: true
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:?DISCORD_BOT_TOKEN is required}
      PERSPECTIVE_API_KEY: ${PERSPECTIVE_API_KEY:?PERSPECTIVE_API_KEY is required}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:?REDDIT_CLIENT_ID is required}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:?REDDIT_CLIENT_SECRET is required}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:?REDDIT_USER_AGENT is required}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
    volumes:
      - type: bind
        source: ./scans
        target: /app/scans
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
